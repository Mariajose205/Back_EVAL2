name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_BACK }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Asegurar que el contenedor corra en la misma red que la Base de Datos
            docker network create innovatech-net || true
            
            # Detener y eliminar contenedor anterior si existe
            docker stop innovatech-api || true
            docker rm innovatech-api || true
            
            # Limpiar imágenes viejas para no llenar el disco de AWS Academy
            docker image prune -f
            
            # Descargar la nueva versión desde Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest
            
            # Levantar el Backend conectado a MySQL y en la misma red lógica
            docker run -d --name innovatech-api \
              --network innovatech-net \
              -p 3000:3000 \
              -e DB_HOST=innovatech-db \
              -e DB_USER=root \
              -e DB_PASSWORD=root_secure_password \
              -e DB_NAME=proyecto_db \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest